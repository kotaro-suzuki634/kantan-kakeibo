databases:
  - name: kantan-kakeibo-db
    plan: free
    databaseName: kantan_kakeibo
    user: kantan_kakeibo_user
services:
  - type: web
    name: kantan-kakeibo
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: kantan-kakeibo-db
          property: connectionString
      - key: NODE_ENV
        value: production
      - key: SESSION_SECRET
        generateValue: true
